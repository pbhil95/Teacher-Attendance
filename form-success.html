<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1e1b4b" id="themeColor">
  <meta name="description" content="Attendance Submitted — JNV Tarikhet">
  <title>Submitted — JNV Tarikhet</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .detail-row-item {
      display: flex;
      border-bottom: 1px solid var(--glass-border);
      padding: 12px 20px;
    }
    .detail-row-item:last-child { border-bottom: none; }
    .detail-label {
      width: 130px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .detail-val {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text-primary);
    }
    .count-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      padding: 16px 20px;
      border-top: 1px solid var(--glass-border);
    }
    .count-item { text-align: center; padding: 8px 4px; }
    .count-item .cval {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .count-item .clbl {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 3px;
      font-weight: 700;
    }
    .detail-card-head {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .tick-anim {
      font-size: 4rem;
      animation: popIn 0.55s var(--ease-bounce, cubic-bezier(0.34,1.56,0.64,1)) both;
      display: block;
      margin-bottom: 16px;
    }
    @media (max-width: 420px) {
      .count-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-label { width: 100px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-branding">
      <h1 class="header-title">📋 JNV Tarikhet</h1>
      <div class="header-subtitle">Staff Attendance</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
      <button class="icon-btn" onclick="doLogout()" title="Sign out">🚪</button>
    </div>
  </header>

  <div class="glass-container">

    <!-- SUCCESS CARD -->
    <div class="glass-card" style="text-align:center; padding:36px 24px; background:linear-gradient(145deg, var(--glass-bg), rgba(16,185,129,0.04));">
      <span class="tick-anim">✅</span>
      <h2 style="font-family:var(--font-heading); font-size:1.9rem; font-weight:800; color:var(--success); margin-bottom:8px; letter-spacing:-0.5px;">Submitted!</h2>
      <p style="color:var(--text-secondary); font-size:0.9rem; line-height:1.7;">Your attendance record has been saved securely.<br>Thank you for submitting on time.</p>
      <div id="tsLine" style="margin-top:14px; font-size:0.75rem; color:var(--text-muted); font-weight:600;"></div>
    </div>

    <!-- DETAIL CARD -->
    <div class="glass-card" id="detailCard" style="display:none;">
      <div class="card-header">
        <span class="card-icon">📝</span>
        <h3 class="detail-card-head">Submission Details</h3>
      </div>
      <div id="detailBody"></div>
    </div>

    <!-- ACTIONS -->
    <div style="display:flex; flex-direction:column; gap:10px;">
      <a href="index.html" class="btn btn-primary">➕ Submit Another Entry</a>
      <a href="dashboard.html" class="btn btn-outline" style="text-decoration:none;">📊 Open Admin Dashboard</a>
      <button class="btn btn-outline" onclick="doLogout()" style="font-size:0.92rem;">🚪 Sign Out</button>
    </div>

  </div>

  <div id="global-toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL  = 'https://cuvleeayglhpuhouvzts.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1dmxlZWF5Z2xocHVob3V2enRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjYxNzgsImV4cCI6MjA5MTUwMjE3OH0.ZTKWwnvSESrSw_h7YCan9RIZxf69mq7tpVmkcIXCG4Y';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);

    async function doLogout() {
      await db.auth.signOut();
      window.location.href = 'index.html';
    }

    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
      document.getElementById('themeColor').setAttribute('content', t === 'dark' ? '#080d1a' : '#1e1b4b');
      localStorage.setItem('theme', t);
    }
    function toggleTheme() {
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
    applyTheme(localStorage.getItem('theme') || 'light');

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Show submission details from sessionStorage
    const raw = sessionStorage.getItem('lastSubmission');
    if (raw) {
      try {
        const d = JSON.parse(raw);
        document.getElementById('detailCard').style.display = '';
        const body = document.getElementById('detailBody');
        const rows = [
          ['Teacher',    esc(d.teacher)],
          ['Period',     'Period ' + esc(d.period)],
          ['Class',      esc(d.class || d.cls)],
          ['Subject',    esc(d.subject)],
          ['Class Taken', d.taken === 'Yes'
            ? '<span class="badge badge-success">✅ Yes</span>'
            : '<span class="badge badge-danger">❌ No</span>']
        ];
        if (d.reason) rows.push(['Reason', esc(d.reason)]);

        let html = rows.map(([l, v]) =>
          `<div class="detail-row-item"><div class="detail-label">${l}</div><div class="detail-val">${v}</div></div>`
        ).join('');

        if (d.taken === 'Yes' && d.total) {
          html += `<div class="count-grid">
            <div class="count-item"><div class="cval">${esc(d.total)}</div><div class="clbl">Total</div></div>
            <div class="count-item"><div class="cval" style="color:var(--success)">${esc(d.present)}</div><div class="clbl">Present</div></div>
            <div class="count-item"><div class="cval" style="color:var(--danger)">${esc(d.absent)}</div><div class="clbl">Absent</div></div>
            <div class="count-item"><div class="cval">${esc(d.leave || d.leave_count || 0)}</div><div class="clbl">Leave</div></div>
            <div class="count-item"><div class="cval">${esc(d.od || 0)}</div><div class="clbl">OD</div></div>
            <div class="count-item"><div class="cval">${esc(d.tca || 0)}</div><div class="clbl">TCA</div></div>
            <div class="count-item"><div class="cval">${esc(d.nr || 0)}</div><div class="clbl">NR</div></div>
            <div class="count-item"><div class="cval">${esc(d.sick || 0)}</div><div class="clbl">Sick</div></div>
          </div>`;
        }
        if (d.remarks) html += `<div class="detail-row-item"><div class="detail-label">Remarks</div><div class="detail-val">${esc(d.remarks)}</div></div>`;
        body.innerHTML = html;
        sessionStorage.removeItem('lastSubmission');
      } catch (e) {}
    }

    // Timestamp
    const now = new Date();
    document.getElementById('tsLine').textContent = 'Submitted at ' +
      now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) + ' on ' +
      now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  </script>
</body>
</html>
