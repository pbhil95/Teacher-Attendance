<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a3a5c" id="themeColor">
<meta name="description" content="Attendance Submitted — JNV Tarikhet">
<title>Submitted — JNV Tarikhet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --blue:#1a5276;--green:#1e8449;--green-light:#eafaf1;
  --red:#922b21;--ok:#1e8449;
  --ink:#1c2434;--muted:#6c7a8a;--border:#d5dde8;
  --bg:#f0f3f8;--card:#fff;--card2:#fafbfd;
  --fh:'Rajdhani',sans-serif;--fb:'Inter',sans-serif;
  --r:14px;--sh:0 4px 24px rgba(28,36,52,.10);
  --hdr1:#1a3a5c;--hdr2:#1a5276;--hdr3:#117a65;
}
[data-theme="dark"]{
  --blue:#60a5fa;--green:#4ade80;--green-light:#14532d;
  --red:#f87171;--ok:#4ade80;
  --ink:#e2e8f0;--muted:#8892a4;--border:#2d3148;
  --bg:#0f1117;--card:#1a1d27;--card2:#1f2235;
  --sh:0 4px 24px rgba(0,0,0,.4);
  --hdr1:#060c14;--hdr2:#0f2744;--hdr3:#065f46;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{transition:background .3s,color .3s;}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);
  min-height:100vh;overscroll-behavior:none;}

.header{background:linear-gradient(135deg,var(--hdr1) 0%,var(--hdr2) 55%,var(--hdr3) 100%);
  color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(0,0,0,.25);}
.header h1{font-family:var(--fh);font-size:1.35rem;font-weight:700;letter-spacing:1px;}
.header p{opacity:.7;font-size:11px;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:8px;}
.theme-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;
  padding:5px 11px;white-space:nowrap;}

.page{max-width:560px;margin:0 auto;padding:26px 14px 40px;}

.success-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);
  padding:30px 24px;text-align:center;margin-bottom:16px;border:1px solid var(--border);}
.tick-circle{width:78px;height:78px;background:var(--green-light);border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  font-size:2.3rem;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-card h2{font-family:var(--fh);font-size:1.55rem;color:var(--green);
  font-weight:700;margin-bottom:6px;}
.success-card p{color:var(--muted);font-size:14px;line-height:1.6;}

.detail-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);
  overflow:hidden;margin-bottom:16px;border:1px solid var(--border);}
.detail-head{background:var(--card2);border-bottom:1px solid var(--border);
  padding:12px 18px;font-family:var(--fh);font-size:1rem;color:var(--blue);font-weight:700;}
.detail-row-item{display:flex;border-bottom:1px solid var(--border);padding:10px 18px;}
.detail-row-item:last-child{border-bottom:none;}
.detail-label{width:125px;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px;flex-shrink:0;padding-top:1px;}
.detail-val{font-size:14px;font-weight:500;}
.pill-ok{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;
  font-weight:600;background:var(--green-light);color:var(--green);}
.pill-no{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;
  font-weight:600;background:#fde8e6;color:var(--red);}

.count-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:12px 18px 16px;}
.count-item{text-align:center;padding:7px 4px;}
.count-item .val{font-family:var(--fh);font-size:1.35rem;font-weight:700;}
.count-item .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

.btn-group{display:flex;flex-direction:column;gap:10px;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;
  font-family:var(--fh);font-size:1.1rem;font-weight:700;letter-spacing:.5px;
  cursor:pointer;text-align:center;text-decoration:none;transition:opacity .2s;}
.btn:active{opacity:.85;}
.btn-primary{background:linear-gradient(135deg,var(--hdr2),var(--hdr3));color:#fff;
  box-shadow:0 4px 18px rgba(26,82,118,.3);}
.btn-outline{background:var(--card);color:var(--blue);border:1.5px solid var(--border);
  box-shadow:0 2px 8px rgba(28,36,52,.07);}
.timestamp{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;}

@media(max-width:420px){
  .count-grid{grid-template-columns:repeat(2,1fr);}
  .detail-label{width:100px;}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📋 JNV Tarikhet</h1>
    <p>Staff Class Attendance</p>
  </div>
  <div class="header-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
    <button class="logout-btn" onclick="doLogout()" title="Sign out">🚪 Logout</button>
  </div>
</div>

<div class="page">

  <div class="success-card">
    <div class="tick-circle">✅</div>
    <h2>Submitted Successfully!</h2>
    <p>Your attendance record has been saved.<br>Thank you for submitting on time.</p>
  </div>

  <div class="detail-card" id="detailCard" style="display:none">
    <div class="detail-head">📝 Submission Details</div>
    <div id="detailBody"></div>
  </div>

  <div class="btn-group">
    <a href="index.html" class="btn btn-primary">➕ Submit Another Entry</a>
    <a href="dashboard.html" class="btn btn-outline">📊 Open Admin Dashboard</a>
    <button class="btn btn-outline" onclick="doLogout()" style="font-size:1rem;">🚪 Sign Out</button>
  </div>

  <div class="timestamp" id="tsLine"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://cuvleeayglhpuhouvzts.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1dmxlZWF5Z2xocHVob3V2enRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjYxNzgsImV4cCI6MjA5MTUwMjE3OH0.ZTKWwnvSESrSw_h7YCan9RIZxf69mq7tpVmkcIXCG4Y';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

async function doLogout(){
  await db.auth.signOut();
  window.location.href='index.html';
}

// Dark mode
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
  document.getElementById('themeColor').setAttribute('content',t==='dark'?'#0f1117':'#1a3a5c');
  localStorage.setItem('theme',t);
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
applyTheme(localStorage.getItem('theme')||'light');

function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Show submission details from sessionStorage
const raw = sessionStorage.getItem('lastSubmission');
if (raw) {
  try {
    const d = JSON.parse(raw);
    document.getElementById('detailCard').style.display='';
    const body = document.getElementById('detailBody');
    const rows=[
      ['Teacher', esc(d.teacher)],
      ['Period', 'Period '+esc(d.period)],
      ['Class', esc(d.class||d.cls)],
      ['Subject', esc(d.subject)],
      ['Class Taken', d.taken==='Yes'?'<span class="pill-ok">✅ Yes</span>':'<span class="pill-no">❌ No</span>']
    ];
    if(d.reason) rows.push(['Reason', esc(d.reason)]);
    let html=rows.map(([l,v])=>
      `<div class="detail-row-item"><div class="detail-label">${l}</div><div class="detail-val">${v}</div></div>`
    ).join('');
    if(d.taken==='Yes'&&d.total){
      html+=`<div class="count-grid">
        <div class="count-item"><div class="val">${esc(d.total)}</div><div class="lbl">Total</div></div>
        <div class="count-item"><div class="val" style="color:var(--green)">${esc(d.present)}</div><div class="lbl">Present</div></div>
        <div class="count-item"><div class="val" style="color:var(--red)">${esc(d.absent)}</div><div class="lbl">Absent</div></div>
        <div class="count-item"><div class="val">${esc(d.leave||d.leave_count||0)}</div><div class="lbl">Leave</div></div>
        <div class="count-item"><div class="val">${esc(d.od||0)}</div><div class="lbl">OD</div></div>
        <div class="count-item"><div class="val">${esc(d.tca||0)}</div><div class="lbl">TCA</div></div>
        <div class="count-item"><div class="val">${esc(d.nr||0)}</div><div class="lbl">NR</div></div>
        <div class="count-item"><div class="val">${esc(d.sick||0)}</div><div class="lbl">Sick</div></div>
      </div>`;
    }
    if(d.remarks) html+=`<div class="detail-row-item"><div class="detail-label">Remarks</div><div class="detail-val">${esc(d.remarks)}</div></div>`;
    body.innerHTML=html;
    sessionStorage.removeItem('lastSubmission');
  } catch(e){}
}

// Timestamp
const now=new Date();
document.getElementById('tsLine').textContent='Submitted at '+
  now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' on '+
  now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
</script>
</body>
</html>
