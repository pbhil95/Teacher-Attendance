<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="Attendance Submitted — JNV Tarikhet">
  <title>Submitted — JNV Tarikhet</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg-base); }

    /* Orbs */
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(90px); opacity: 0.45; }
    .orb-1 { width:500px;height:500px; background: radial-gradient(circle, rgba(99,102,241,0.3) 0%,transparent 70%); top:-150px;left:-150px; }
    .orb-2 { width:350px;height:350px; background: radial-gradient(circle, rgba(16,185,129,0.22) 0%,transparent 70%); bottom:0;right:-80px; }

    /* Page layout */
    .page-wrap {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .content-area {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 80px;
    }

    /* Success card */
    .success-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--glass-bd);
      border-radius: var(--r-2xl);
      overflow: hidden;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--sh-xl), 0 0 60px rgba(16,185,129,0.07);
      animation: fadeSlideIn 0.5s var(--spring) both;
    }

    .success-hero {
      padding: 48px 36px 32px;
      text-align: center;
      background: linear-gradient(160deg,
        rgba(16,185,129,0.12) 0%,
        rgba(99,102,241,0.07) 100%);
      border-bottom: 1px solid var(--bd);
      position: relative;
    }
    .success-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(16,185,129,0.18) 0%, transparent 60%);
    }

    @keyframes popIn {
      from { transform: scale(0.4) rotate(-12deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .tick-icon {
      font-size: 4.5rem;
      display: block;
      margin-bottom: 18px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative;
      z-index: 1;
    }

    .success-title {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--emerald-lt);
      letter-spacing: -0.8px;
      margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .success-sub {
      color: var(--t2);
      font-size: 0.9rem;
      line-height: 1.65;
      position: relative; z-index: 1;
    }
    .ts-line {
      margin-top: 12px;
      font-size: 0.73rem;
      color: var(--t3);
      font-weight: 600;
      position: relative; z-index: 1;
    }

    /* Detail rows */
    .detail-list { padding: 0; }
    .detail-row-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 13px 28px;
      border-bottom: 1px solid var(--bd);
      transition: background 0.15s var(--ease);
    }
    .detail-row-item:last-child { border-bottom: none; }
    .detail-row-item:hover { background: var(--bg-hover); }
    .detail-label {
      font-size: 0.63rem;
      font-weight: 700;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 1.3px;
      min-width: 95px;
      padding-top: 3px;
      flex-shrink: 0;
    }
    .detail-val {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--t1);
      line-height: 1.5;
    }

    /* Count grid */
    .count-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid var(--bd);
    }
    .count-item {
      text-align: center;
      padding: 16px 8px;
      border-right: 1px solid var(--bd);
    }
    .count-item:last-child { border-right: none; }
    .cval {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--t1);
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 5px;
    }
    .clbl {
      font-size: 0.63rem;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    /* Actions */
    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 24px 28px;
      background: var(--bg-raised);
      border-top: 1px solid var(--bd);
    }

    @media (max-width: 480px) {
      .success-hero { padding: 32px 20px 24px; }
      .success-title { font-size: 1.8rem; }
      .detail-row-item { padding: 12px 18px; }
      .count-grid { grid-template-columns: repeat(2, 1fr); }
      .success-actions { padding: 18px; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="page-wrap">
    <!-- Header -->
    <header class="app-header">
      <div class="header-branding">
        <h1 class="header-title">
          <span class="logo-icon">📋</span>
          JNV Tarikhet
        </h1>
        <div class="header-subtitle">Staff Attendance</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle dark mode">☀</button>
        <button class="icon-btn" onclick="doLogout()" title="Sign out">🚪</button>
      </div>
    </header>

    <div class="content-area">
      <div class="success-card">

        <!-- Hero section -->
        <div class="success-hero">
          <span class="tick-icon">✅</span>
          <h2 class="success-title">Submitted!</h2>
          <p class="success-sub">Your attendance record has been saved securely.<br>Thank you for submitting on time.</p>
          <div class="ts-line" id="tsLine"></div>
        </div>

        <!-- Detail rows injected by JS -->
        <div id="detailCard" style="display:none;">
          <div id="detailBody" class="detail-list"></div>
        </div>

        <!-- Actions -->
        <div class="success-actions">
          <a href="index.html" class="btn btn-primary" style="text-align:center;text-decoration:none;">➕ Submit Another Entry</a>
          <a href="dashboard.html" class="btn btn-outline" style="text-align:center;text-decoration:none;">📊 Open Admin Dashboard</a>
          <button class="btn btn-outline" onclick="doLogout()" style="font-size:0.9rem;">🚪 Sign Out</button>
        </div>

      </div>
    </div>
  </div>

  <div id="global-toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // ── Supabase ──
    const SUPABASE_URL  = 'https://cuvleeayglhpuhouvzts.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1dmxlZWF5Z2xocHVob3V2enRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjYxNzgsImV4cCI6MjA5MTUwMjE3OH0.ZTKWwnvSESrSw_h7YCan9RIZxf69mq7tpVmkcIXCG4Y';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);

    async function doLogout() {
      await db.auth.signOut();
      window.location.href = 'index.html';
    }

    // ── Theme ──
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeBtn').textContent = t === 'dark' ? '☀' : '🌙';
      localStorage.setItem('nova-theme', t);
    }
    function toggleTheme() {
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
    applyTheme(localStorage.getItem('nova-theme') || 'light');

    // ── HTML escape ──
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Render submission details from sessionStorage ──
    const raw = sessionStorage.getItem('lastSubmission');
    if (raw) {
      try {
        const d = JSON.parse(raw);
        document.getElementById('detailCard').style.display = '';
        const body = document.getElementById('detailBody');

        const rows = [
          ['Teacher',     esc(d.teacher)],
          ['Period',      'Period ' + esc(d.period)],
          ['Class',       esc(d.class || d.cls)],
          ['Subject',     esc(d.subject)],
          ['Class Taken', d.taken === 'Yes'
            ? '<span class="badge badge-success">✅ Yes</span>'
            : '<span class="badge badge-danger">❌ No</span>']
        ];
        if (d.reason) rows.push(['Reason', esc(d.reason)]);

        let html = rows.map(([l, v]) =>
          `<div class="detail-row-item"><div class="detail-label">${l}</div><div class="detail-val">${v}</div></div>`
        ).join('');

        if (d.taken === 'Yes' && d.total) {
          html += `<div class="count-grid">
            <div class="count-item"><div class="cval">${esc(d.total)}</div><div class="clbl">Total</div></div>
            <div class="count-item"><div class="cval" style="color:var(--emerald-lt)">${esc(d.present)}</div><div class="clbl">Present</div></div>
            <div class="count-item"><div class="cval" style="color:var(--rose-lt)">${esc(d.absent)}</div><div class="clbl">Absent</div></div>
            <div class="count-item"><div class="cval">${esc(d.leave_count||0)}</div><div class="clbl">Leave</div></div>
            <div class="count-item"><div class="cval">${esc(d.od||0)}</div><div class="clbl">OD</div></div>
            <div class="count-item"><div class="cval">${esc(d.tca||0)}</div><div class="clbl">TCA</div></div>
            <div class="count-item"><div class="cval">${esc(d.nr||0)}</div><div class="clbl">NR</div></div>
            <div class="count-item"><div class="cval">${esc(d.sick||0)}</div><div class="clbl">Sick</div></div>
          </div>`;
        }

        if (d.remarks) {
          html += `<div class="detail-row-item"><div class="detail-label">Remarks</div><div class="detail-val">${esc(d.remarks)}</div></div>`;
        }

        body.innerHTML = html;
        sessionStorage.removeItem('lastSubmission');
      } catch(e) {}
    }

    // ── Timestamp ──
    const now = new Date();
    document.getElementById('tsLine').textContent =
      'Submitted at ' +
      now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) +
      ' on ' +
      now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  </script>
</body>
</html>
