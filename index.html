<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c" id="themeColor">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="JNV Tarikhet Staff Class Attendance Submission Form">
  <title>Attendance Form — JNV Tarikhet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    /* ── LIGHT THEME ── */
    :root,
    [data-theme="light"] {
      --blue: #1a5276;
      --blue2: #2471a3;
      --blue-light: #eaf2f8;
      --teal: #117a65;
      --teal-light: #e8f8f5;
      --green: #1e8449;
      --green-light: #eafaf1;
      --amber: #b7770d;
      --red: #922b21;
      --red-light: #fdedec;
      --ink: #1c2434;
      --muted: #6c7a8a;
      --border: #d5dde8;
      --bg: #f0f3f8;
      --card: #ffffff;
      --card2: #fafbfd;
      --fh: 'Rajdhani', sans-serif;
      --fb: 'Inter', sans-serif;
      --r: 14px;
      --sh: 0 4px 24px rgba(28, 36, 52, .10);
      --hdr1: #1a3a5c;
      --hdr2: #1a5276;
      --hdr3: #117a65;
    }

    /* ── DARK THEME ── */
    [data-theme="dark"] {
      --blue: #60a5fa;
      --blue2: #93c5fd;
      --blue-light: #1e3a5f;
      --teal: #34d399;
      --teal-light: #064e3b;
      --green: #4ade80;
      --green-light: #14532d;
      --amber: #fbbf24;
      --red: #f87171;
      --red-light: #450a0a;
      --ink: #e2e8f0;
      --muted: #8892a4;
      --border: #2d3148;
      --bg: #0f1117;
      --card: #1a1d27;
      --card2: #1f2235;
      --sh: 0 4px 24px rgba(0, 0, 0, .4);
      --hdr1: #0d1b2e;
      --hdr2: #0f2744;
      --hdr3: #065f46;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      transition: background .3s, color .3s;
    }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      min-height: 100vh;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      transition: background .3s, color .3s;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, var(--hdr1) 0%, var(--hdr2) 55%, var(--hdr3) 100%);
      color: #fff;
      padding: 16px 20px 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .25);
      position: relative;
    }

    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-center {
      text-align: center;
      flex: 1;
    }

    .header-logo {
      font-size: 2rem;
      margin-bottom: 2px;
    }

    .header h1 {
      font-family: var(--fh);
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 1px;
    }

    .header p {
      opacity: .72;
      font-size: 11px;
      font-weight: 500;
    }

    .header-badge {
      display: inline-block;
      margin-top: 7px;
      background: rgba(255, 255, 255, .15);
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 20px;
      padding: 3px 13px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
    }

    .theme-btn {
      background: rgba(255, 255, 255, .15);
      border: 1px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }

    .theme-btn:hover {
      background: rgba(255, 255, 255, .25);
    }

    /* ── LAYOUT ── */
    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    /* ── SECTION ── */
    .section {
      background: var(--card);
      border-radius: var(--r);
      box-shadow: var(--sh);
      margin-bottom: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: background .3s, border-color .3s;
    }

    .section-head {
      padding: 13px 18px 11px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card2);
      transition: background .3s, border-color .3s;
    }

    .section-icon {
      font-size: 1.25rem;
    }

    .section-head h2 {
      font-family: var(--fh);
      font-size: 1.05rem;
      color: var(--blue);
      font-weight: 700;
      letter-spacing: .5px;
    }

    .section-body {
      padding: 16px 18px;
    }

    /* ── FORM FIELDS ── */
    .field {
      margin-bottom: 15px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 6px;
    }

    label .req {
      color: var(--red);
      margin-left: 2px;
    }

    select,
    input[type=text],
    input[type=number],
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--fb);
      font-size: 15px;
      color: var(--ink);
      background: var(--card);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .3s;
      -webkit-appearance: none;
      appearance: none;
    }

    select:focus,
    input:focus,
    textarea:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(36, 113, 163, .15);
    }

    textarea {
      resize: vertical;
      min-height: 70px;
      line-height: 1.5;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    /* ── RADIO TOGGLE ── */
    .radio-group {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
    }

    .radio-opt {
      flex: 1;
      min-width: 120px;
    }

    .radio-opt input[type=radio] {
      display: none;
    }

    .radio-opt label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      transition: all .2s;
      background: var(--card2);
    }

    .radio-opt input[type=radio]:checked+label {
      border-color: var(--blue);
      background: var(--blue-light);
      color: var(--blue);
    }

    .radio-opt.yes input[type=radio]:checked+label {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }

    .radio-opt.no input[type=radio]:checked+label {
      border-color: var(--red);
      background: var(--red-light);
      color: var(--red);
    }

    /* ── PERIOD PILLS ── */
    .period-group {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .period-opt input[type=radio] {
      display: none;
    }

    .period-opt label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 46px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--fh);
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--card2);
      transition: all .2s;
    }

    .period-opt input[type=radio]:checked+label {
      border-color: var(--blue);
      background: var(--blue-light);
      color: var(--blue);
    }

    /* ── NUMBER GRID ── */
    .num-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      gap: 9px;
    }

    .num-card {
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      transition: background .3s, border-color .3s;
    }

    .num-card label {
      font-size: 10.5px;
      margin-bottom: 4px;
    }

    .num-card input {
      border: none;
      background: transparent;
      padding: 4px 0;
      font-size: 1.45rem;
      font-family: var(--fh);
      font-weight: 700;
      color: var(--ink);
      width: 100%;
      outline: none;
      transition: color .3s;
    }

    .num-card input::-webkit-outer-spin-button,
    .num-card input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* ── MATH CHECK ── */
    .math-check {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .3s;
      margin-top: 13px;
    }

    .math-ok {
      background: var(--green-light);
      color: var(--green);
      border: 1px solid var(--teal-light);
    }

    .math-err {
      background: var(--red-light);
      color: var(--red);
      border: 1px solid #fca5a5;
    }

    .math-neu {
      background: var(--card2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .hidden {
      display: none !important;
    }

    /* ── SUBMIT ── */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--hdr2), var(--hdr3));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: var(--fh);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 18px rgba(26, 82, 118, .3);
      margin-top: 4px;
    }

    .submit-btn:hover {
      opacity: .93;
    }

    .submit-btn:active {
      transform: scale(.98);
    }

    .submit-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255, 255, 255, .4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── DASHBOARD LINK ── */
    .dash-link {
      text-align: center;
      margin-top: 16px;
    }

    .dash-link a {
      color: var(--blue2);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 2px 8px rgba(28, 36, 52, .07);
      transition: background .2s;
    }

    .dash-link a:hover {
      background: var(--blue-light);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1c2434;
      color: #fff;
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all .3s;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .3);
    }

    [data-theme="dark"] .toast {
      background: #e2e8f0;
      color: #1c2434;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── RESPONSIVE ── */
    @media(max-width:480px) {
      .page {
        padding: 14px 10px 32px;
      }

      .section-body {
        padding: 14px;
      }

      .header h1 {
        font-size: 1.25rem;
      }

      .num-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .period-group {
        gap: 5px;
      }

      .period-opt label {
        width: 44px;
        height: 42px;
        font-size: .95rem;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-inner">
      <div style="width:40px"></div>
      <div class="header-center">
        <div class="header-logo">📋</div>
        <h1>JNV Tarikhet</h1>
        <p>Jawahar Navodaya Vidyalaya, Tarikhet • Almora</p>
        <div class="header-badge">Staff Class Attendance Form</div>
      </div>
      <button class="theme-btn" id="themeToggle" title="Toggle dark mode" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div class="page">
    <form id="attForm" novalidate>

      <!-- TEACHER -->
      <div class="section">
        <div class="section-head">
          <span class="section-icon">👤</span>
          <h2>Teacher Information</h2>
        </div>
        <div class="section-body">
          <div class="field">
            <label for="teacher">Your Name / Designation <span class="req">*</span></label>
            <div class="select-wrap">
              <select id="teacher" required>
                <option value="">— Select your name —</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Period Number <span class="req">*</span></label>
            <div class="period-group" id="periodGroup"></div>
          </div>
        </div>
      </div>

      <!-- CLASS DETAILS -->
      <div class="section">
        <div class="section-head">
          <span class="section-icon">🏫</span>
          <h2>Class Details</h2>
        </div>
        <div class="section-body">
          <div class="field">
            <label for="cls">Class <span class="req">*</span></label>
            <div class="select-wrap">
              <select id="cls" required>
                <option value="">— Select class —</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="subject">Subject Taught <span class="req">*</span></label>
            <div class="select-wrap">
              <select id="subject" required>
                <option value="">— Select subject —</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Was the Class Taken? <span class="req">*</span></label>
            <div class="radio-group">
              <div class="radio-opt yes">
                <input type="radio" name="taken" id="takenYes" value="Yes" required>
                <label for="takenYes">✅ Yes, class was taken</label>
              </div>
              <div class="radio-opt no">
                <input type="radio" name="taken" id="takenNo" value="No">
                <label for="takenNo">❌ No, class not taken</label>
              </div>
            </div>
          </div>
          <div class="field hidden" id="reasonField">
            <label for="reason">Reason for Not Taking Class</label>
            <div class="select-wrap">
              <select id="reason">
                <option value="">— Select reason —</option>
                <option>Leave</option>
                <option>Medical Leave</option>
                <option>Assembly / Prayer</option>
                <option>Official Duty</option>
                <option>School Event</option>
                <option>Other</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- ATTENDANCE COUNTS -->
      <div class="section hidden" id="countsSection">
        <div class="section-head">
          <span class="section-icon">🔢</span>
          <h2>Attendance Count</h2>
        </div>
        <div class="section-body">
          <div class="num-grid">
            <div class="num-card">
              <label for="total">Total Students</label>
              <input type="number" id="total" min="0" max="60" placeholder="0" oninput="updateMath()">
            </div>
            <div class="num-card">
              <label for="present" style="color:var(--green)">Present</label>
              <input type="number" id="present" min="0" max="60" placeholder="0" oninput="updateMath()"
                style="color:var(--green)">
            </div>
            <div class="num-card">
              <label for="absent" style="color:var(--red)">Absent</label>
              <input type="number" id="absent" min="0" max="60" placeholder="0" oninput="updateMath()"
                style="color:var(--red)">
            </div>
            <div class="num-card">
              <label for="leave">On Leave</label>
              <input type="number" id="leave" min="0" max="60" placeholder="0" oninput="updateMath()">
            </div>
            <div class="num-card">
              <label for="od">On OD</label>
              <input type="number" id="od" min="0" max="60" placeholder="0" oninput="updateMath()">
            </div>
            <div class="num-card">
              <label for="tca">TCA</label>
              <input type="number" id="tca" min="0" max="60" placeholder="0" oninput="updateMath()">
            </div>
            <div class="num-card">
              <label for="nr">NR</label>
              <input type="number" id="nr" min="0" max="60" placeholder="0" oninput="updateMath()">
            </div>
            <div class="num-card">
              <label for="sick">Sick</label>
              <input type="number" id="sick" min="0" max="60" placeholder="0" oninput="updateMath()">
            </div>
          </div>
          <div id="mathCheck" class="math-check math-neu">
            ⊞ Fill counts — total must equal Present + Absent + Leave + OD + TCA + NR + Sick
          </div>
        </div>
      </div>

      <!-- REMARKS -->
      <div class="section">
        <div class="section-head">
          <span class="section-icon">💬</span>
          <h2>Additional Remarks</h2>
        </div>
        <div class="section-body">
          <div class="field">
            <label for="remarks">Remarks (optional)</label>
            <textarea id="remarks" placeholder="Any additional notes..."></textarea>
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit Attendance →</button>
    </form>

    <div class="dash-link">
      <a href="dashboard.html">📊 Open Admin Dashboard</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

    // ── DARK MODE ─────────────────────────────────────────────────
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
      document.getElementById('themeColor').setAttribute('content', t === 'dark' ? '#0f1117' : '#1a3a5c');

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');

    // ── POPULATE DROPDOWNS ────────────────────────────────────────
    function populateSelect(id, items) {
      const sel = document.getElementById(id);
      items.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; sel.appendChild(o); });
    }
    populateSelect('teacher', TEACHERS);
    populateSelect('cls', CLASSES);
    populateSelect('subject', SUBJECTS);

    const pg = document.getElementById('periodGroup');
    PERIODS.forEach(p => {
      const div = document.createElement('div');
      div.className = 'period-opt';
      div.innerHTML = `<input type="radio" name="period" id="p${p}" value="${p}" required>
    <label for="p${p}">P${p}</label>`;
      pg.appendChild(div);
    });

    // ── TAKEN TOGGLE ──────────────────────────────────────────────
    document.querySelectorAll('input[name="taken"]').forEach(r => {
      r.addEventListener('change', () => {
        const taken = document.querySelector('input[name="taken"]:checked')?.value === 'Yes';
        document.getElementById('countsSection').classList.toggle('hidden', !taken);
        document.getElementById('reasonField').classList.toggle('hidden', taken);
        if (!taken) {
          ['total', 'present', 'absent', 'leave', 'od', 'tca', 'nr', 'sick'].forEach(id => document.getElementById(id).value = '');
          setMath('neu', '⊞ Fill counts above when class is taken');
        }
      });
    });

    // ── MATH CHECK ────────────────────────────────────────────────
    const getN = id => parseInt(document.getElementById(id).value) || 0;
    function setMath(cls, msg) {
      const el = document.getElementById('mathCheck');
      el.className = 'math-check math-' + cls;
      el.textContent = msg;
    }
    function updateMath() {
      const total = getN('total');
      const sum = getN('present') + getN('absent') + getN('leave') + getN('od') + getN('tca') + getN('nr') + getN('sick');
      if (!total && !sum) { setMath('neu', '⊞ Enter counts above — sum must equal Total Students'); return; }
      if (sum === total) setMath('ok', `✅ Sum (${sum}) = Total (${total}) — Correct!`);
      else {
        const diff = sum - total;
        setMath('err', `❌ Sum (${sum}) ≠ Total (${total}) — Diff: ${diff > 0 ? '+' : ''}${diff}`);
      }
    }

    // ── TOAST ─────────────────────────────────────────────────────
    function showToast(msg, dur = 3500) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), dur);
    }

    // ── SUBMIT ────────────────────────────────────────────────────
    document.getElementById('attForm').addEventListener('submit', async e => {
      e.preventDefault();

      const teacher = document.getElementById('teacher').value;
      const period = document.querySelector('input[name="period"]:checked')?.value;
      const cls = document.getElementById('cls').value;
      const subject = document.getElementById('subject').value;
      const taken = document.querySelector('input[name="taken"]:checked')?.value;

      if (!teacher) { showToast('⚠️ Please select your name'); return; }
      if (!period) { showToast('⚠️ Please select a period'); return; }
      if (!cls) { showToast('⚠️ Please select a class'); return; }
      if (!subject) { showToast('⚠️ Please select a subject'); return; }
      if (!taken) { showToast('⚠️ Please select if class was taken'); return; }

      if (taken === 'Yes') {
        const total = getN('total');
        const sum = getN('present') + getN('absent') + getN('leave') + getN('od') + getN('tca') + getN('nr') + getN('sick');
        if (!total) { showToast('⚠️ Please enter Total Students'); return; }
        if (sum !== total) { showToast(`❌ Math error: Sum (${sum}) ≠ Total (${total})`); return; }
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Submitting...';

      const payload = {
        teacher, period, class: cls, subject, taken,
        total: taken === 'Yes' ? getN('total') : 0,
        present: taken === 'Yes' ? getN('present') : 0,
        leave_count: taken === 'Yes' ? getN('leave') : 0,
        od: taken === 'Yes' ? getN('od') : 0,
        absent: taken === 'Yes' ? getN('absent') : 0,
        tca: taken === 'Yes' ? getN('tca') : 0,
        nr: taken === 'Yes' ? getN('nr') : 0,
        sick: taken === 'Yes' ? getN('sick') : 0,
        reason: document.getElementById('reason').value,
        remarks: document.getElementById('remarks').value.trim()
      };

      try {
        const { error } = await db.from('attendance').insert([payload]);
        if (error) throw error;
        // Save for success page display
        sessionStorage.setItem('lastSubmission', JSON.stringify({
          ...payload, leave: payload.leave_count
        }));
        window.location.href = 'form-success.html';
      } catch (err) {
        showToast('❌ Error: ' + (err.message || String(err)), 5000);
        btn.disabled = false;
        btn.textContent = 'Submit Attendance →';
      }
    });
  </script>
</body>

</html>
